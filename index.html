<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>KNRM VHF Monitor</title>

<style>
:root{
  --knrm-orange:#ED6D3A;
  --panel:#141c24;
  --panel-soft:#1b2630;
  --text-soft:#9fb3c8;
}

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#001c2e;
  color:white;
  height:100vh;
  overflow:hidden;
}

/* ===== LAYOUT ===== */

.dashboard{
  display:grid;
  grid-template-columns:380px 1fr;
  height:100vh;
}

/* ===== P2000 ===== */

.p2000{
  background:#0f1a24;
  border-right:2px solid var(--knrm-orange);
  display:flex;
  flex-direction:column;
}

.p2000-header{
  padding:14px;
  font-weight:600;
  background:var(--panel);
  border-bottom:1px solid #222;
}

.p2000-list{
  flex:1;
  overflow:auto;
  padding:10px;
  font-size:13px;
}

.p2000-item{
  background:#16222c;
  padding:8px;
  margin-bottom:6px;
  border-radius:6px;
  border-left:3px solid var(--knrm-orange);
}

.p2000-time{
  font-size:11px;
  color:var(--text-soft);
  margin-bottom:4px;
}

/* ===== MAIN ===== */

.main{
  display:flex;
  flex-direction:column;
}

header{
  background:rgba(20,28,36,.95);
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  border-bottom:2px solid var(--knrm-orange);
}

.header-left{
  display:flex;
  align-items:flex-end;
  gap:15px;
}

.header-left img{
  height:38px;
  filter:brightness(0) invert(1);
}

.header-title{
  font-size:18px;
  font-weight:600;
}

.header-right{
  display:flex;
  align-items:flex-end;
  gap:20px;
}

.clock{
  text-align:right;
  font-size:14px;
  color:var(--text-soft);
}

.clock .time{
  font-size:20px;
  font-weight:600;
  color:white;
}

.header-buttons{
  display:flex;
  gap:10px;
}

.master-btn{
  padding:6px 14px;
  border-radius:20px;
  border:none;
  background:var(--panel-soft);
  color:white;
  cursor:pointer;
}

/* ===== GRID ===== */

.grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;
  overflow:auto;
}

.tile{
  background:var(--panel);
  padding:16px;
  border-radius:16px;
  transition:.2s;
}

.tile.active{
  background:linear-gradient(
    180deg,
    rgba(237,109,58,0.18),
    rgba(20,28,36,0.95)
  );
  border:1px solid rgba(237,109,58,0.6);
}

.tile-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  font-weight:600;
}

.toggle{
  width:38px;
  height:20px;
  background:#444;
  border-radius:20px;
  position:relative;
  cursor:pointer;
}

.toggle::after{
  content:"";
  width:16
  height:16px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:.2s;
}

.toggle.on{
  background:rgba(237,109,58,0.8);
}

.toggle.on::after{
  left:20px;
}

.status{
  font-size:12px;
  margin:6px 0;
  color:var(--text-soft);
}

.status.live{color:#00e676;}
.status.buffering{color:orange;}

.vu{
  height:8px;
  background:#222;
  border-radius:4px;
  overflow:hidden;
  margin:8px 0;
}

.vu-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,var(--knrm-orange));
}

input[type=range]{width:100%;}
</style>
</head>

<body>

<div class="dashboard">

  <!-- P2000 -->
  <div class="p2000">
    <div class="p2000-header">P2000 – KNRM</div>
    <div id="p2000List" class="p2000-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <header>
      <div class="header-left">
        <img src="knrm-logo-white.png">
        <div class="header-title">VHF Monitor</div>
      </div>

      <div class="header-right">
        <div class="clock">
          <div class="time" id="localTime"></div>
          <div id="dateLine"></div>
          <div id="utcLine"></div>
        </div>

        <button id="masterBtn" class="master-btn" onclick="toggleAll()">▶ Play all</button>
      </div>
    </header>

    <div class="grid" id="grid"></div>

  </div>
</div>

<script>

/* ===== STREAMS ===== */
const streams=[
 {name:"Scheveningen",url:"https://listen.broadcastify.com/c5r9fnj4qx8k7s0.mp3?nc=65742&xan=xtf9912b41c"},
 {name:"Ter Heijde",url:"https://listen.broadcastify.com/3zf8yrvk1pnwq60.mp3?nc=46783&xan=xtf9912b41c"},
 {name:"Katwijk",url:"https://listen.broadcastify.com/fmbw8yd4vhsg75p.mp3?nc=50199&xan=xtf9912b41c"},
 {name:"Eems Dollard",url:"https://listen.broadcastify.com/c2gxqpy759fdz3s.mp3?nc=62998&xan=xtf9912b41c"},
 {name:"Gooi-, Eem, IJmeer",url:"https://listen.broadcastify.com/w7qfv5y0shtc3d6.mp3?nc=52441&xan=xtf9912b41c"},
 {name:"Texel",url:"https://listen.broadcastify.com/yd67vxw59h4nzrm.mp3?nc=98592&xan=xtf9912b41c"},
 {name:"IJmuiden",url:"https://listen.broadcastify.com/2hwqmync3p8ts41.mp3?nc=88899&xan=xtf9912b41c"},
 {name:"Vlissingen",url:"https://listen.broadcastify.com/f49q2szn16hdm0y.mp3?nc=56146&xan=xtf9912b41c"},
 {name:"Renesse",url:"https://listen.broadcastify.com/5g00vkjn18msdbt.mp3?nc=54023&xan=xtf9912b41c"},
 {name:"Brandaris",url:"https://www.tbandsma.nl:8443/;"},
 {name:"Sneekermeer",url:"https://listen.broadcastify.com/7364218m0knp9jh.mp3?nc=5281&xan=xtf9912b41c"}
];

const grid=document.getElementById("grid");
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let allPlaying=false;

/* ===== BUILD TILES ===== */
streams.forEach((stream,index)=>{
  const tile=document.createElement("div");
  tile.className="tile";
  tile.innerHTML=`
    <div class="tile-header">
      <div>${stream.name}</div>
      <div id="toggle${index}" class="toggle"></div>
    </div>
    <div class="status buffering" id="status${index}">Buffering...</div>
    <div class="vu"><div class="vu-bar" id="vu${index}"></div></div>
    <audio id="audio${index}" src="${stream.url}" crossorigin="anonymous"></audio>
  `;
  grid.appendChild(tile);
  setupAudio(index);
});

function setupAudio(index){
  const audio=document.getElementById("audio"+index);
  const tile=audio.parentElement;
  const toggle=document.getElementById("toggle"+index);
  const vuBar=document.getElementById("vu"+index);
  const status=document.getElementById("status"+index);

  toggle.onclick=()=>toggleStream(index);

  audio.addEventListener("playing",()=>{
    status.textContent="Live";
    status.className="status live";
    toggle.classList.add("on");
  });

  audio.addEventListener("pause",()=>{
    toggle.classList.remove("on");
  });

  const source=audioCtx.createMediaElementSource(audio);
  const analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  const dataArray=new Uint8Array(analyser.frequencyBinCount);

  function monitor(){
    analyser.getByteFrequencyData(dataArray);
    let sum=0;
    for(let i=0;i<dataArray.length;i++) sum+=dataArray[i];
    let avg=sum/dataArray.length;

    vuBar.style.width=Math.min(avg*2,100)+"%";

    if(avg>8){
      tile.classList.add("active");
      setTimeout(()=>tile.classList.remove("active"),800);
    }

    requestAnimationFrame(monitor);
  }

  audio.onplay=()=>{
    audioCtx.resume();
    monitor();
  };
}

function toggleStream(i){
  const audio=document.getElementById("audio"+i);
  if(audio.paused){audio.play();}
  else{audio.pause();}
}

function toggleAll(){
  const audios=document.querySelectorAll("audio");
  allPlaying=!allPlaying;

  audios.forEach(a=>{
    if(allPlaying){a.play();}
    else{a.pause();}
  });

  document.getElementById("masterBtn").innerHTML=
    allPlaying ? "⏹ Stop all" : "▶ Play all";
}

/* ===== CLOCK ===== */
function updateClock(){
  const now=new Date();
  document.getElementById("localTime").textContent=
    now.toLocaleTimeString("nl-NL",{hour12:false});
  document.getElementById("dateLine").textContent=
    now.toLocaleDateString("nl-NL");
  document.getElementById("utcLine").textContent=
    "UTC "+now.toUTCString().split(" ")[4];
}
setInterval(updateClock,1000);
updateClock();

/* ===== P2000 RSS ===== */
async function loadP2000(){
  try{
    const rssUrl="https://feeds.livep2000.nl/rss.xml";
    const api="https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(rssUrl);

    const response=await fetch(api);
    const data=await response.json();

    const list=document.getElementById("p2000List");
    list.innerHTML="";

    const knrm=data.items
      .filter(item=>item.title.toLowerCase().includes("knrm"))
      .slice(0,20);

    knrm.forEach(item=>{
      const div=document.createElement("div");
      div.className="p2000-item";

      const time=new Date(item.pubDate).toLocaleString("nl-NL");

      div.innerHTML=`
        <div class="p2000-time">${time}</div>
        <div>${item.title}</div>
      `;

      list.appendChild(div);
    });

  }catch(e){
    console.log("P2000 fout:",e);
  }
}

loadP2000();
setInterval(loadP2000,30000);

window.addEventListener("click",()=>audioCtx.resume());

</script>

</body>
</html>
