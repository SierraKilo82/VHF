<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>KNRM VHF Monitor</title>

<style>
:root{
  --knrm-orange:#ED6D3A;
  --panel:#141c24;
  --panel-soft:#1b2630;
  --text-soft:#9fb3c8;
}

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#001c2e;
  color:white;
  height:100vh;
  overflow:hidden;
}

/* ====== LAYOUT ====== */

.dashboard{
  display:grid;
  grid-template-columns: 420px 1fr;
  height:100vh;
}

/* ====== LINKER KOLOM ====== */

.p2000-column{
  background:#0f1a24;
  border-right:2px solid var(--knrm-orange);
  display:flex;
  flex-direction:column;
}

.p2000-header{
  padding:15px;
  font-weight:600;
  background:var(--panel);
  border-bottom:1px solid #222;
}

.p2000-frame{
  flex:1;
}

.p2000-frame iframe{
  width:100%;
  height:100%;
  border:none;
}

/* ====== RECHTER KOLOM ====== */

.main{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* HEADER */

.header{
  padding:20px;
  border-bottom:2px solid var(--knrm-orange);
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}

.header-left{
  display:flex;
  align-items:flex-end;
  gap:20px;
}

.header-left img{
  height:48px;
  filter:brightness(0) invert(1);
}

.title{
  font-size:28px;
  font-weight:600;
}

.clock{
  text-align:right;
}

.clock .time{
  font-size:56px;
  font-weight:700;
}

.clock .date{
  font-size:18px;
  color:var(--text-soft);
}

/* GRID */

.grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:24px;
  padding:24px;
  overflow:auto;
}

.tile{
  background:var(--panel);
  padding:22px;
  border-radius:18px;
  transition:.2s;
  position:relative;
}

.tile.active{
  background:linear-gradient(
    180deg,
    rgba(237,109,58,0.25),
    rgba(20,28,36,0.95)
  );
  border:1px solid rgba(237,109,58,0.7);
  box-shadow:0 0 25px rgba(237,109,58,0.4);
}

.tile-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
  font-weight:600;
}

.toggle{
  width:46px;
  height:24px;
  background:#444;
  border-radius:24px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}

.toggle::after{
  content:"";
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:.2s;
}

.toggle.on{
  background:rgba(237,109,58,0.8);
}

.toggle.on::after{
  left:24px;
}

.status{
  font-size:14px;
  margin:10px 0;
  color:var(--text-soft);
}

.status.live{color:#00e676;}
.status.buffering{color:orange;}

.vu{
  height:14px;
  background:#222;
  border-radius:6px;
  overflow:hidden;
}

.vu-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,var(--knrm-orange));
}

.controls{
  margin-top:12px;
}

input[type=range]{width:100%;}
</style>
</head>

<body>

<div class="dashboard">

  <!-- LINKER KOLOM -->
  <div class="p2000-column">
    <div class="p2000-header">P2000 – KNRM</div>
    <div class="p2000-frame">
      <iframe src="https://p2000.page/d/knrm"></iframe>
    </div>
  </div>

  <!-- RECHTER KOLOM -->
  <div class="main">

    <div class="header">
      <div class="header-left">
        <img src="knrm-logo-white.png">
        <div class="title">VHF Monitor</div>
      </div>
      <div class="clock">
        <div class="time" id="localTime"></div>
        <div class="date" id="dateLine"></div>
        <div class="date" id="utcLine"></div>
      </div>
    </div>

    <div class="grid" id="grid"></div>

  </div>

</div>

<script>
const streams=[
 {name:"Scheveningen",url:"https://listen.broadcastify.com/c5r9fnj4qx8k7s0.mp3?nc=65742&xan=xtf9912b41c"},
 {name:"Ter Heijde",url:"https://listen.broadcastify.com/3zf8yrvk1pnwq60.mp3?nc=46783&xan=xtf9912b41c"},
 {name:"Katwijk",url:"https://listen.broadcastify.com/fmbw8yd4vhsg75p.mp3?nc=50199&xan=xtf9912b41c"}
];

const grid=document.getElementById("grid");
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();

streams.forEach((stream,index)=>{
  const tile=document.createElement("div");
  tile.className="tile";
  tile.innerHTML=`
    <div class="tile-header">
      <div>${stream.name}</div>
      <div id="toggle${index}" class="toggle"></div>
    </div>
    <div class="status buffering" id="status${index}">Buffering...</div>
    <div class="vu"><div class="vu-bar" id="vu${index}"></div></div>
    <div class="controls">
      Volume 
      <input type="range" min="0" max="1" step="0.01" value="0.7" id="vol${index}">
    </div>
    <audio id="audio${index}" src="${stream.url}" crossorigin="anonymous"></audio>
  `;
  grid.appendChild(tile);
  setupAudio(index);
});

function setupAudio(index){
  const audio=document.getElementById("audio"+index);
  const tile=audio.parentElement;
  const toggle=document.getElementById("toggle"+index);
  const vuBar=document.getElementById("vu"+index);
  const status=document.getElementById("status"+index);

  toggle.onclick=()=>toggleStream(index);

  audio.addEventListener("playing",()=>{
    status.textContent="Live";
    status.className="status live";
    toggle.classList.add("on");
  });

  audio.addEventListener("pause",()=>{
    toggle.classList.remove("on");
  });

  audio.addEventListener("waiting",()=>{
    status.textContent="Buffering...";
    status.className="status buffering";
  });

  const source=audioCtx.createMediaElementSource(audio);
  const analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  const dataArray=new Uint8Array(analyser.frequencyBinCount);

  function monitor(){
    analyser.getByteFrequencyData(dataArray);
    let sum=0;
    for(let i=0;i<dataArray.length;i++) sum+=dataArray[i];
    let avg=sum/dataArray.length;

    vuBar.style.width=Math.min(avg*2,100)+"%";

    if(avg>8){
      tile.classList.add("active");
      clearTimeout(tile.timeout);
      tile.timeout=setTimeout(()=>tile.classList.remove("active"),1000);
    }

    requestAnimationFrame(monitor);
  }

  audio.onplay=()=>{
    audioCtx.resume();
    monitor();
  };
}

function toggleStream(i){
  const audio=document.getElementById("audio"+i);
  if(audio.paused){audio.play();}
  else{audio.pause();}
}

/* CLOCK */
function updateClock(){
  const now=new Date();
  document.getElementById("localTime").textContent=
    now.toLocaleTimeString("nl-NL",{hour12:false});
  document.getElementById("dateLine").textContent=
    now.toLocaleDateString("nl-NL");
  document.getElementById("utcLine").textContent=
    "UTC "+now.toUTCString().split(" ")[4];
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
