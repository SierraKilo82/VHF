<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>KNRM VHF Monitor</title>

<style>
:root{
  --knrm-orange:#ED6D3A;
  --panel:#141c24;
  --panel-soft:#1b2630;
  --text-soft:#9fb3c8;
}

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#001c2e;
  color:white;
}

.dashboard{
  display:grid;
  grid-template-columns:380px 1fr;
  min-height:100vh;
}

/* ===== P2000 ===== */

.p2000{
  background:#0f1a24;
  border-right:2px solid var(--knrm-orange);
  display:flex;
  flex-direction:column;
}

.p2000-header{
  padding:14px;
  font-weight:600;
  background:var(--panel);
  border-bottom:1px solid #222;
}

.p2000-list{
  padding:10px;
  overflow:auto;
  font-size:13px;
  flex:1;
}

/* ===== HEADER ===== */

header{
  background:#141c24;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid var(--knrm-orange);
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.header-left img{
  height:40px;
  filter:brightness(0) invert(1);
}

.header-right{
  display:flex;
  align-items:center;
  gap:15px;
}

.clock{
  text-align:right;
  font-size:14px;
}

.clock .time{
  font-size:22px;
  font-weight:600;
}

.master-btn{
  background:var(--panel-soft);
  border:none;
  padding:6px 14px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

.icon-btn{
  background:var(--panel-soft);
  border:none;
  width:38px;
  height:38px;
  border-radius:50%;
  color:white;
  cursor:pointer;
}

/* ===== GRID ===== */

.grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;
}

.tile{
  background:var(--panel);
  padding:16px;
  border-radius:16px;
  transition:.2s;
}

.tile.active{
  background:linear-gradient(
    180deg,
    rgba(237,109,58,0.18),
    rgba(20,28,36,0.95)
  );
  border:1px solid rgba(237,109,58,0.6);
}

.tile-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
  font-size:14px;
}

.toggle{
  width:40px;
  height:20px;
  background:#444;
  border-radius:20px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}

.toggle::after{
  content:"";
  width:16px;
  height:16px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:.2s;
}

.toggle.on{
  background:var(--knrm-orange);
}

.toggle.on::after{
  left:22px;
}

.status{
  font-size:12px;
  margin:6px 0;
  color:#00e676;
}

.vu{
  height:8px;
  background:#222;
  border-radius:4px;
  overflow:hidden;
  margin:8px 0;
}

.vu-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,var(--knrm-orange));
}

input[type=range]{
  width:100%;
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="p2000">
    <div class="p2000-header">P2000 – KNRM</div>
    <div id="p2000List" class="p2000-list">Laden...</div>
  </div>

  <div>

<header>
  <div class="header-left">
    <img src="knrm-logo-white.png">
    <div><strong>VHF Monitor</strong></div>
  </div>

  <div class="header-right">
    <div class="clock">
      <div class="time" id="localTime"></div>
      <div id="dateLine"></div>
      <div id="utcLine"></div>
    </div>

    <button id="masterBtn" class="master-btn">▶ Play all</button>
    <button class="icon-btn" onclick="document.body.classList.toggle('night')">🌙</button>
    <button class="icon-btn" onclick="toggleFullscreen()">⛶</button>
  </div>
</header>

<div class="grid" id="grid"></div>

  </div>
</div>

<script>

/* ===== STREAMS ===== */
const streams=[
 {name:"Scheveningen",url:"https://listen.broadcastify.com/c5r9fnj4qx8k7s0.mp3?nc=65742&xan=xtf9912b41c"},
 {name:"Ter Heijde",url:"https://listen.broadcastify.com/3zf8yrvk1pnwq60.mp3?nc=46783&xan=xtf9912b41c"},
 {name:"Katwijk",url:"https://listen.broadcastify.com/fmbw8yd4vhsg75p.mp3?nc=50199&xan=xtf9912b41c"},
 {name:"Eems Dollard",url:"https://listen.broadcastify.com/c2gxqpy759fdz3s.mp3?nc=62998&xan=xtf9912b41c"},
 {name:"Gooi-, Eem, IJmeer",url:"https://listen.broadcastify.com/w7qfv5y0shtc3d6.mp3?nc=52441&xan=xtf9912b41c"},
 {name:"Texel",url:"https://listen.broadcastify.com/yd67vxw59h4nzrm.mp3?nc=98592&xan=xtf9912b41c"},
 {name:"IJmuiden",url:"https://listen.broadcastify.com/2hwqmync3p8ts41.mp3?nc=88899&xan=xtf9912b41c"},
 {name:"Vlissingen",url:"https://listen.broadcastify.com/f49q2szn16hdm0y.mp3?nc=56146&xan=xtf9912b41c"},
 {name:"Renesse",url:"https://listen.broadcastify.com/5g00vkjn18msdbt.mp3?nc=54023&xan=xtf9912b41c"},
 {name:"Brandaris",url:"https://www.tbandsma.nl:8443/;"},
 {name:"Sneekermeer",url:"https://listen.broadcastify.com/7364218m0knp9jh.mp3?nc=5281&xan=xtf9912b41c"}
];

const grid=document.getElementById("grid");
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let allPlaying=false;

/* ===== BUILD TILES ===== */

streams.forEach((stream,index)=>{
  const tile=document.createElement("div");
  tile.className="tile";

  tile.innerHTML=`
    <div class="tile-header">
      <div>${stream.name}</div>
      <div id="toggle${index}" class="toggle"></div>
    </div>
    <div class="status">Live</div>
    <div class="vu"><div class="vu-bar" id="vu${index}"></div></div>
    <div>Volume</div>
    <input type="range" min="0" max="1" step="0.01" value="0.7" id="vol${index}">
    <audio id="audio${index}" src="${stream.url}" crossorigin="anonymous"></audio>
  `;

  grid.appendChild(tile);

  const audio=document.getElementById("audio"+index);
  const toggle=document.getElementById("toggle"+index);
  const vuBar=document.getElementById("vu"+index);
  const vol=document.getElementById("vol"+index);

  vol.oninput=()=>audio.volume=vol.value;

  toggle.onclick=()=>{
    if(audio.paused){ audio.play(); toggle.classList.add("on"); }
    else{ audio.pause(); toggle.classList.remove("on"); }
  };

  const source=audioCtx.createMediaElementSource(audio);
  const analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  const dataArray=new Uint8Array(analyser.frequencyBinCount);

  function monitor(){
    analyser.getByteFrequencyData(dataArray);
    let avg=dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
    vuBar.style.width=Math.min(avg*2,100)+"%";
    if(avg>8){
      tile.classList.add("active");
      setTimeout(()=>tile.classList.remove("active"),800);
    }
    requestAnimationFrame(monitor);
  }

  audio.onplay=()=>{audioCtx.resume(); monitor();};
});

/* CLOCK */
function updateClock(){
  const now=new Date();
  document.getElementById("localTime").textContent=
    now.toLocaleTimeString("nl-NL",{hour12:false});
  document.getElementById("dateLine").textContent=
    now.toLocaleDateString("nl-NL");
  document.getElementById("utcLine").textContent=
    "UTC "+now.toUTCString().split(" ")[4];
}
setInterval(updateClock,1000);
updateClock();

</script>
